name: Build Release Artifacts

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Pin Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test

  prepare-release:
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          existing=$(gh release view "$tag" --repo ${{ github.repository }} --json isDraft --jq '.isDraft' 2>/dev/null || echo "none")
          if [ "$existing" = "false" ]; then
            gh release delete "$tag" --repo ${{ github.repository }} --yes
          fi
          gh release create "$tag" --draft --title "$tag" --notes "" --repo ${{ github.repository }} 2>/dev/null || true

  build:
    needs: [prepare-release]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            args: --linux AppImage deb
          - os: windows-latest
            platform: win
            args: --win nsis
          - os: macos-latest
            platform: mac
            args: --mac dmg zip --x64 --arm64
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # node-gyp 9 (used to rebuild native deps for the Electron ABI) still
      # imports `distutils`, which Python 3.12+ removed. All three runner
      # images now ship 3.12, so pin to 3.11 everywhere.
      - name: Pin Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build native addon (macOS only)
        if: matrix.platform == 'mac'
        run: |
          cd src/native && npx node-gyp rebuild --target=$(node -e "console.log(require('electron/package.json').version)") --arch=arm64 --dist-url=https://electronjs.org/headers
          mkdir -p ../../native
          cp build/Release/darwin_shortcut.node ../../native/
        # arm64 binary — x64 gets Rosetta translation. For true universal,
        # a second node-gyp rebuild with --arch=x64 and lipo would be needed.

      - name: Build app
        run: pnpm build
        env:
          NODE_OPTIONS: --max-old-space-size=6144

      - name: Build and publish Electron distributables
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ matrix.platform == 'mac' && secrets.CSC_LINK || '' }}
          CSC_KEY_PASSWORD: ${{ matrix.platform == 'mac' && secrets.CSC_KEY_PASSWORD || '' }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: pnpm exec electron-builder ${{ matrix.args }} --publish always

  publish:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          if [ -f RELEASE_NOTES.md ]; then
            awk -v ver="$tag" '
              /^Version v[0-9]/ { capture = ($2 == ver) ? 1 : 0; next }
              capture { print }
            ' RELEASE_NOTES.md > /tmp/release-notes-section.md
            if [ -s /tmp/release-notes-section.md ]; then
              gh release edit "$tag" --notes-file /tmp/release-notes-section.md
            fi
            # If the tag has no matching section, leave release notes empty
            # rather than dumping the entire RELEASE_NOTES.md file.
          fi

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          gh release edit "$tag" --draft=false
