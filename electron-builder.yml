appId: dev.otto.app
productName: Otto
directories:
  output: dist
  buildResources: build
files:
  - out/**
  - public/tray/**
  - public/svg/**
  - package.json

publish:
  provider: github
  owner: darkharasho
  repo: otto

linux:
  target:
    - AppImage
    - deb
  category: Utility
  maintainer: otto-dev@otto.app
  icon: build/icon.png
  artifactName: ${productName}-${version}-${arch}.${ext}

win:
  target: nsis
  icon: build/icon.ico
  artifactName: ${productName}-${version}-${arch}-setup.${ext}

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  category: public.app-category.utilities
  icon: build/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  notarize:
    teamId: YMPSC6RQ4F

asarUnpack:
  - "**/node_modules/better-sqlite3/**"
  - "**/node_modules/sharp/**"
  # The Claude Agent SDK spawns a child `node` process pointed at its bundled
  # cli.js. asar paths aren't readable by that child process, so unpack the SDK
  # (and its embedded wasm assets) onto the real filesystem.
  - "**/node_modules/@anthropic-ai/claude-agent-sdk/**"
