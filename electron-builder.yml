appId: dev.otto.app
productName: Otto
# Our postinstall already rebuilds better-sqlite3 (the only native dep we need
# matched to Electron's ABI) via @electron/rebuild's JS API with onlyModules.
# Without this, electron-builder runs its own full-tree rebuild at package time
# and trips on usocket (POSIX-only, can't compile on Windows).
npmRebuild: false
directories:
  output: dist
  buildResources: build
files:
  - out/**
  - public/tray/**
  - public/svg/**
  - package.json
  - native/darwin_shortcut.node
  # Electron is always glibc-linked; the musl claude binary is ~235MB of dead
  # weight in the package.
  - "!**/node_modules/@anthropic-ai/claude-agent-sdk-*-musl/**"

extraResources:
  # Ship the whisper-server binary (built by scripts/setup-voice-dev.sh) into
  # resources/voice/ in the packaged app. The glob targets the binary file only
  # — models/ is intentionally excluded so multi-hundred-MB model files are
  # never bundled. If electron-builder errors here about a missing source, run
  # scripts/setup-voice-dev.sh first to build the binary.
  - from: resources/voice/whisper-server
    to: voice/whisper-server
  # Embedding model must live at <resourcesPath>/embedding — embedder.ts's
  # modelDir() resolves there when app.isPackaged. Shipping it via `files` +
  # asarUnpack put it at app.asar.unpacked/resources/embedding instead, which
  # broke the packaged embedder (found by the voice packaged smoke test).
  - from: resources/embedding
    to: embedding

publish:
  provider: github
  owner: darkharasho
  repo: otto

linux:
  target:
    - AppImage
    - deb
  category: Utility
  maintainer: otto-dev@otto.app
  icon: build/icon.png
  artifactName: ${productName}-${version}-${arch}.${ext}

win:
  target: nsis
  icon: build/icon.ico
  artifactName: ${productName}-${version}-${arch}-setup.${ext}

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  category: public.app-category.utilities
  icon: build/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    LSUIElement: true
  notarize:
    teamId: YMPSC6RQ4F

asarUnpack:
  - "native/darwin_shortcut.node"
  - "**/node_modules/better-sqlite3/**"
  - "**/node_modules/sharp/**"
  # sharp's native binding and libvips live in platform-specific @img/*
  # packages (sharp-linux-x64 → .node, sharp-libvips-linux-x64 → .so).
  # electron-builder auto-unpacks .node files but leaves the libvips .so
  # inside the asar, and dlopen can't traverse app.asar — sharp (and with it
  # @huggingface/transformers → Kokoro TTS/the embedder) fails to load with
  # ERR_DLOPEN_FAILED unless the whole scope is unpacked.
  - "**/node_modules/@img/**"
  # The Claude Agent SDK (0.3.x) spawns a native `claude` binary shipped in a
  # per-platform optional package. child_process.spawn can't traverse app.asar
  # (spawn ENOTDIR), so both the SDK and the platform binary packages must live
  # on the real filesystem. sdk-client.ts points pathToClaudeCodeExecutable at
  # the unpacked binary.
  - "**/node_modules/@anthropic-ai/claude-agent-sdk/**"
  - "**/node_modules/@anthropic-ai/claude-agent-sdk-*/**"
  - "**/node_modules/onnxruntime-node/**"
  - "**/node_modules/sqlite-vec/**"
  # The actual loadable extension (vec0.so/.dll/.dylib) lives in a sibling
  # platform-specific package, not in sqlite-vec itself. dlopen can't traverse
  # into app.asar, so the platform binary has to be on the real filesystem.
  - "**/node_modules/sqlite-vec-*/**"
