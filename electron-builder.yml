appId: dev.otto.app
productName: Otto
# Our postinstall already rebuilds better-sqlite3 (the only native dep we need
# matched to Electron's ABI) via @electron/rebuild's JS API with onlyModules.
# Without this, electron-builder runs its own full-tree rebuild at package time
# and trips on usocket (POSIX-only, can't compile on Windows).
npmRebuild: false
directories:
  output: dist
  buildResources: build
files:
  - out/**
  - public/tray/**
  - public/svg/**
  - package.json
  - resources/embedding/**
  - native/darwin_shortcut.node

publish:
  provider: github
  owner: darkharasho
  repo: otto

linux:
  target:
    - AppImage
    - deb
  category: Utility
  maintainer: otto-dev@otto.app
  icon: build/icon.png
  artifactName: ${productName}-${version}-${arch}.${ext}

win:
  target: nsis
  icon: build/icon.ico
  artifactName: ${productName}-${version}-${arch}-setup.${ext}

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  category: public.app-category.utilities
  icon: build/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    LSUIElement: true
  notarize:
    teamId: YMPSC6RQ4F

asarUnpack:
  - "native/darwin_shortcut.node"
  - "**/node_modules/better-sqlite3/**"
  - "**/node_modules/sharp/**"
  # The Claude Agent SDK spawns a child `node` process pointed at its bundled
  # cli.js. asar paths aren't readable by that child process, so unpack the SDK
  # (and its embedded wasm assets) onto the real filesystem.
  - "**/node_modules/@anthropic-ai/claude-agent-sdk/**"
  - "**/node_modules/onnxruntime-node/**"
  - "**/node_modules/sqlite-vec/**"
  # The actual loadable extension (vec0.so/.dll/.dylib) lives in a sibling
  # platform-specific package, not in sqlite-vec itself. dlopen can't traverse
  # into app.asar, so the platform binary has to be on the real filesystem.
  - "**/node_modules/sqlite-vec-*/**"
  - "**/node_modules/@xenova/transformers/**"
  - "resources/embedding/**"
